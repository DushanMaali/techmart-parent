<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Details - TechMart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container my-5">
    <div id="product-details" class="row">
        <div class="text-center">Loading product details...</div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const pid = urlParams.get('pid');

    fetch('get-product-details?pid=' + pid)
        .then(res => res.json())
        .then(p => {
            const container = document.getElementById('product-details');
            if (!p.productId) {
                container.innerHTML = `<h3 class="text-danger text-center">Product not found!</h3>`;
                return;
            }

            container.innerHTML = `
                <div class="col-md-6">
                    <img src="https://via.placeholder.com/500" class="img-fluid rounded" alt="${p.productName}">
                </div>
                <div class="col-md-6">
                    <h2>${p.productName}</h2>
                    <h3 class="text-primary">LKR ${p.price.toLocaleString()}</h3>
                    <p class="mt-3">Select Warehouse:</p>
                    <select class="form-select mb-3" id="warehouse-select">
                        <option value="" selected disabled>Loading Warehouses...</option>
                    </select>
                    <div class="d-grid gap-2 d-md-block">
                        <button class="btn btn-primary" onclick="addToCart(${p.productId})">Add to Cart</button>
                        <button class="btn btn-dark" onclick="buyNow(${p.productId})">Buy Now</button>
                    </div>
                </div>
            `;
            loadWarehouses(pid);
        });

    // 2. Warehouse
    function loadWarehouses(pid) {
        fetch('get-stock?pid=' + pid)
            .then(res => res.json())
            .then(stockMap => {
                const dropdown = document.getElementById('warehouse-select');
                dropdown.innerHTML = `<option value="" disabled selected>-- Choose Warehouse --</option>`;
                for (let wName in stockMap) {
                    dropdown.innerHTML += `<option value="${stockMap[wName].id}">${wName} (${stockMap[wName].qty} left)</option>`;
                }
            });
    }

    // 3. Add to Cart
    function addToCart(pid) {
        const wid = document.getElementById('warehouse-select').value;
        if (!wid) { alert("⚠️ Please select a warehouse!"); return; }

        fetch(`add-to-cart?pid=${pid}&wid=${wid}&qty=1`)
            .then(res => res.json())
            .then(data => { alert(data.success ? "✅ Added to cart!" : "❌ Failed!"); });
    }

    // 4. Buy Now
    function buyNow(pid) {
        const wid = document.getElementById('warehouse-select').value;
        if (!wid) { alert("⚠️ Please select a warehouse!"); return; }

        // checkout.html
        window.location.href = `checkout.html?pid=${pid}&wid=${wid}&qty=1`;
    }
</script>
</body>
</html>
