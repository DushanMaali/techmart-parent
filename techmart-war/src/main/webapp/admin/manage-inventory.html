<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TechMart | Inventory Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .sidebar { height: 100vh; background: #2c3e50; color: white; width: 260px; position: fixed; top: 0; left: 0; padding-top: 20px; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
        .sidebar h4 { color: #ecf0f1; margin-bottom: 30px; }
        .sidebar a { color: #bdc3c7; text-decoration: none; display: block; padding: 15px 25px; font-size: 1.1rem; transition: 0.3s; }
        .sidebar a:hover { background: #34495e; color: white; border-left: 5px solid #3498db; }
        .main-content { margin-left: 260px; padding: 40px; }
    </style>
</head>
<body>

<div id="admin-toast-container" style="position: fixed; top: 20px; right: 20px; z-index: 1050;"></div>

<div class="sidebar">
    <h4 class="text-center"><i class="bi bi-shop"></i> TechMart Admin</h4>
    <a href="admin-dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="manage-products.html"><i class="bi bi-box-seam"></i> Products</a>
    <a href="manage-inventory.html"><i class="bi bi-stack"></i> Inventory</a>
    <a href="manage-orders.html"><i class="bi bi-cart-check"></i> Orders</a>
    <a href="manage-warehouse.html"><i class="bi bi-house-door"></i> Warehouses</a>
    <a href="manage-users.html"><i class="bi bi-people"></i> Users</a>
</div>

<div class="main-content">
    <h3>Inventory Management</h3>
    <button class="btn btn-primary mb-3" onclick="document.getElementById('invPanel').style.display='block'">+ Add Inventory</button>

    <div id="invPanel" class="card p-4 mb-4" style="display: none;">
        <h5>Add Inventory</h5>
        <form action="../admin/inventory-action?action=add" method="POST" class="row g-3">
            <div class="col-md-3">
                <select name="productId" class="form-control" required><option value="">Select Product</option></select>
            </div>
            <div class="col-md-3">
                <select name="warehouseId" class="form-control" required><option value="">Select Warehouse</option></select>
            </div>
            <div class="col-md-2"><input type="number" name="quantity" class="form-control" placeholder="Qty" required></div>
            <div class="col-md-2"><button type="submit" class="btn btn-success">Save</button></div>
            <div class="col-md-2"><button type="button" class="btn btn-secondary" onclick="document.getElementById('invPanel').style.display='none'">Close</button></div>
        </form>
    </div>

    <table class="table table-bordered bg-white">
        <thead><tr><th>ID</th><th>Product</th><th>Warehouse</th><th>Quantity</th></tr></thead>
        <tbody id="inventoryTable"></tbody>
    </table>
</div>

<script>
    fetch('../products').then(res => res.json()).then(data => {
        data.forEach(p => document.querySelector('select[name="productId"]').innerHTML += `<option value="${p.productId}">${p.productName}</option>`);
    });
    fetch('../warehouses').then(res => res.json()).then(data => {
        data.forEach(w => document.querySelector('select[name="warehouseId"]').innerHTML += `<option value="${w.warehouse_id}">${w.name}</option>`);
    });
    fetch('../inventory-list').then(res => res.json()).then(data => {
        data.forEach(i => document.getElementById('inventoryTable').innerHTML += `<tr><td>${i.inventoryId}</td><td>${i.product.productName}</td><td>${i.warehouse.name}</td><td>${i.quantity}</td></tr>`);
    });
</script>
<script src="../js/admin-notifications.js"></script>
</body>
</html>
