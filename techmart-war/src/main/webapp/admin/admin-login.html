<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TechMart | Admin Login</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { width: 100%; max-width: 400px; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); background: white; }
        .brand-text { color: #0d6efd; font-weight: bold; font-size: 2rem; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="brand-text">TechMart</div>
    <h5 class="text-center mb-4 text-muted">Admin Access</h5>

    <form id="loginForm">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" id="u" class="form-control" placeholder="Enter username" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" id="p" class="form-control" placeholder="Enter password" required>
        </div>
        <div class="d-grid mt-4">
            <button type="submit" class="btn btn-primary btn-lg">Sign In</button>
        </div>
    </form>
</div>

<script>
    document.getElementById('loginForm').onsubmit = function(e) {
        e.preventDefault();
        let data = new URLSearchParams();
        data.append('username', document.getElementById('u').value);
        data.append('password', document.getElementById('p').value);

        fetch('../admin-login', { method: 'POST', body: data })
            .then(res => res.json())
            .then(json => {
                if(json.success) {
                    window.location.href = 'admin-dashboard.html';
                } else {
                    alert(json.message);
                }
            })
            .catch(err => alert("Connection error!"));
    }
</script>
</body>
</html>
