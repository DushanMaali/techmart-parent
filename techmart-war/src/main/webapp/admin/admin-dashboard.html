<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TechMart | Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .sidebar { height: 100vh; background: #2c3e50; color: white; width: 260px; position: fixed; top: 0; left: 0; padding-top: 20px; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
        .sidebar h4 { color: #ecf0f1; margin-bottom: 30px; }
        .sidebar a { color: #bdc3c7; text-decoration: none; display: block; padding: 15px 25px; font-size: 1.1rem; transition: 0.3s; }
        .sidebar a:hover { background: #34495e; color: white; border-left: 5px solid #3498db; }
        .main-content { margin-left: 260px; padding: 40px; }
        .stat-card { border-radius: 15px; padding: 30px; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .bg-blue { background: linear-gradient(45deg, #3498db, #2980b9); }
        .bg-green { background: linear-gradient(45deg, #27ae60, #2ecc71); }
        .bg-orange { background: linear-gradient(45deg, #e67e22, #f39c12); }
    </style>
</head>
<body>

<div class="sidebar">
    <h4 class="text-center"><i class="bi bi-shop"></i> TechMart Admin</h4>
    <a href="admin-dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="manage-products.html"><i class="bi bi-box-seam"></i> Products</a>
    <a href="manage-inventory.html"><i class="bi bi-stack"></i> Inventory</a>
    <a href="manage-orders.html"><i class="bi bi-cart-check"></i> Orders</a>
    <a href="manage-warehouse.html"><i class="bi bi-house-door"></i> Warehouses</a>
    <a href="manage-users.html"><i class="bi bi-people"></i> Users</a>
</div>

<div class="main-content">
    <h2 class="mb-4">Dashboard Overview</h2>
    <div class="row g-4">
        <div class="col-md-4"><div class="stat-card bg-blue"><h6>Total Orders</h6><h3 id="totalOrders">Loading...</h3></div></div>
        <div class="col-md-4"><div class="stat-card bg-green"><h6>Best Selling Item</h6><h5 id="bestProduct">Loading...</h5></div></div>
        <div class="col-md-4"><div class="stat-card bg-orange"><h6>Best Warehouse</h6><h5 id="bestWarehouse">Loading...</h5></div></div>
    </div>

    <div class="mt-5 p-4 bg-white rounded shadow-sm">
        <h4 class="mb-3"><i class="bi bi-bell"></i> Recent Notifications</h4>
        <div id="notification-container" class="list-group"></div>
    </div>
</div>

<script>

    function loadStats() {
        fetch('stats')
            .then(res => res.json())
            .then(data => {
                document.getElementById('totalOrders').innerText = data.totalOrders;
                document.getElementById('bestProduct').innerText = data.bestProduct;
                document.getElementById('bestWarehouse').innerText = data.bestWarehouse;
            });
    }


    function loadNotifications() {
        fetch('/techmart-war/admin-notifications')
            .then(res => res.json())
            .then(data => {
                let container = document.getElementById('notification-container');
                container.innerHTML = "";
                data.forEach(n => {
                    container.innerHTML += `
                    <div class="list-group-item d-flex justify-content-between align-items-center">
                        <span><i class="bi bi-bell-fill text-warning me-2"></i> ${n.message}</span>
                        <small class="text-muted">ID: ${n.id}</small>
                    </div>`;
                });
            });
    }


    loadStats();
    loadNotifications();

    setInterval(loadNotifications, 5000);
    setInterval(loadStats, 10000);
</script>

</body>
</html>
