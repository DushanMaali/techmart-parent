<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TechMart | Manage Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        /* Sidebar Styles */
        .sidebar { height: 100vh; background: #2c3e50; color: white; width: 260px; position: fixed; top: 0; left: 0; padding-top: 20px; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
        .sidebar h4 { color: #ecf0f1; margin-bottom: 30px; }
        .sidebar a { color: #bdc3c7; text-decoration: none; display: block; padding: 15px 25px; font-size: 1.1rem; transition: 0.3s; }
        .sidebar a:hover { background: #34495e; color: white; border-left: 5px solid #3498db; }

        /* Main Content */
        .main-content { margin-left: 260px; padding: 40px; }
        .stat-card { border-radius: 15px; padding: 30px; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .bg-blue { background: linear-gradient(45deg, #3498db, #2980b9); }
        .bg-green { background: linear-gradient(45deg, #27ae60, #2ecc71); }
        .bg-orange { background: linear-gradient(45deg, #e67e22, #f39c12); }
    </style>

</head>
<body class="bg-light">

<div id="admin-toast-container" style="position: fixed; top: 20px; right: 20px; z-index: 1050;"></div>

<!-- Sidebar -->
<div class="sidebar">
    <h4 class="text-center"><i class="bi bi-shop"></i> TechMart Admin</h4>
    <a href="admin-dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="manage-products.html"><i class="bi bi-box-seam"></i> Products</a>
    <a href="manage-inventory.html"><i class="bi bi-stack"></i> Inventory</a>
    <a href="manage-orders.html"><i class="bi bi-cart-check"></i> Orders</a>
    <a href="manage-warehouse.html"><i class="bi bi-house-door"></i> Warehouses</a>
    <a href="manage-users.html"><i class="bi bi-people"></i> Users</a>
</div>

<div class="container mt-5">
    <h3>Product Management</h3>

    <form action="../admin/product-action?action=add" method="POST" class="row g-3 mb-4">
        <div class="col-md-2"><input type="text" name="name" class="form-control" placeholder="Name" required></div>
        <div class="col-md-2"><input type="number" step="0.01" name="price" class="form-control" placeholder="Price" required></div>
        <div class="col-md-2"><input type="text" name="description" class="form-control" placeholder="Description"></div>
        <div class="col-md-2"><input type="text" name="img" class="form-control" placeholder="Image URL"></div>
        <div class="col-md-2">
            <select name="categoryId" class="form-control" required>
                <option value="">Select Category</option>
            </select>
        </div>
        <div class="col-md-2"><button type="submit" class="btn btn-primary w-100">Add</button></div>
    </form>

    <table class="table table-bordered bg-white">
        <thead><tr><th>ID</th><th>Name</th><th>Price</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="productTable"></tbody>
    </table>
</div>

<script>
    fetch('../categories')
        .then(res => res.json())
        .then(cats => {
            let select = document.querySelector('select[name="categoryId"]');
            cats.forEach(c => select.innerHTML += `<option value="${c.categoryId}">${c.categoryName}</option>`);
        });

    fetch('../products')
        .then(res => res.json())
        .then(products => {
            let tbody = document.getElementById('productTable');
            products.forEach(p => {
                tbody.innerHTML += `<tr>
                    <td>${p.productId}</td>
                    <td>${p.productName}</td>
                    <td>${p.price}</td>
                    <td>${p.status == 1 ? 'Active' : 'Inactive'}</td>
                    <td>
                        <button class="btn btn-sm btn-info" onclick="editProduct(${p.productId}, '${p.productName}', ${p.price}, '${p.description}')">Edit</button>
                        <button class="btn btn-sm btn-warning" onclick="toggleStatus(${p.productId}, ${p.status})">Toggle</button>
                    </td>
                </tr>`;
            });
        });

    function editProduct(id, name, price, desc) {
        let n = prompt("Name:", name);
        let p = prompt("Price:", price);
        let d = prompt("Description:", desc);
        if(n && p) {
            let f = document.createElement('form');
            f.method = 'POST';
            f.action = `../admin/product-action?action=update&id=${id}&name=${n}&price=${p}&description=${d}`;
            document.body.appendChild(f); f.submit();
        }
    }

    function toggleStatus(id, s) {
        fetch(`../admin/product-action?action=status&id=${id}&status=${s == 1 ? 0 : 1}`, { method: 'POST' })
            .then(() => location.reload());
    }
</script>
<script src="../js/admin-notifications.js"></script>
</body>
</html>
