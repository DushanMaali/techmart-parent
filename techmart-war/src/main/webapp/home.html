<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechMart | Home</title>
    <!-- Bootstrap CSS for modern and clean UI -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .product-card { border: 1px solid #eee; padding: 20px; border-radius: 12px; transition: 0.3s; background: #fff; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .category-title { border-left: 5px solid #0d6efd; padding-left: 10px; margin-top: 40px; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body class="bg-light">

<!-- Header Navigation -->
<header class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm p-3">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="index.html">TechMart</a>
        <nav id="nav-container" class="d-flex gap-2"></nav>
    </div>
</header>

<!-- Main Content Area -->
<main class="container my-4">
    <div id="product-list-container">
        <!-- Products grouped by Category will load here dynamically -->
    </div>
</main>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    let isLoggedIn = false;

    // 1. Header Status Load
    fetch('user-status')
        .then(res => res.json())
        .then(data => {
            let nav = document.getElementById('nav-container');
            if (data.status === 'logged') {
                isLoggedIn = true;
                nav.innerHTML = `
                    <span class="text-white align-self-center me-3">Hello, <strong>${data.name}</strong></span>
                    <a href="cart.html" class="btn btn-outline-light btn-sm">Cart</a>
                    <a href="profile.html" class="btn btn-outline-light btn-sm">Profile</a>
                    <a href="logout" class="btn btn-danger btn-sm">Logout</a>`;
            } else {
                isLoggedIn = false;
                nav.innerHTML = `
                    <a href="login.html" class="btn btn-primary btn-sm">Login</a>
                    <a href="cart.html" class="btn btn-outline-light btn-sm">Cart</a>`;
            }
        });

    // 2. Load Category-Wise Products and their Warehouses
    fetch('get-products-by-category')
        .then(res => res.json())
        .then(data => {
            let container = document.getElementById('product-list-container');
            container.innerHTML = "";

            if (Object.keys(data).length === 0) {
                container.innerHTML = `<div class="alert alert-warning text-center">No active products available!</div>`;
                return;
            }

            for (let categoryName in data) {
                let sectionId = "cat-" + categoryName.replace(/\s+/g, '-');
                container.innerHTML += `
                    <div class="mb-5">
                        <h3 class="category-title text-uppercase">${categoryName}</h3>
                        <div class="row g-4" id="${sectionId}"></div>
                    </div>`;

                let row = document.getElementById(sectionId);
                data[categoryName].forEach(p => {
                    let descriptionText = p.description ? p.description : 'No description available.';

                    row.innerHTML += `
                        <div class="col-md-3">
                            <div class="product-card h-100 d-flex flex-column justify-content-between shadow-sm">
                                <div>
                                    <h5 class="fw-bold mb-2">${p.productName}</h5>
                                    <p class="text-muted small">${descriptionText}</p>
                                </div>
                                <div class="mt-3">
                                    <p class="text-primary fw-bold fs-5 mb-2">LKR ${p.price.toLocaleString()}</p>

                                    <!-- Warehouse Selection Dropdown -->
                                    <div class="mb-3">
                                        <label class="form-label small fw-bold text-muted mb-1">Select Warehouse:</label>
                                        <select class="form-select form-select-sm warehouse-dropdown" id="warehouse-select-${p.productId}" data-pid="${p.productId}">
                                            <option value="" selected disabled>Loading Warehouses...</option>
                                        </select>
                                    </div>

                                    <div class="d-grid gap-2">
                                        <a href="product-view.html?pid=${p.productId}" class="btn btn-outline-secondary btn-sm mb-2">View Details</a>
                                        <button class="btn btn-primary btn-sm" onclick="processAction(${p.productId}, 'cart')">Add to Cart</button>
                                        <button class="btn btn-dark btn-sm" onclick="processAction(${p.productId}, 'buy')">Buy Now</button>
                                    </div>
                                </div>
                            </div>
                        </div>`;
                });
            }

            document.querySelectorAll('.warehouse-dropdown').forEach(dropdown => {
                let pid = dropdown.getAttribute('data-pid');

                fetch('get-stock?pid=' + pid)
                    .then(res => res.json())
                    .then(stockMap => {
                        dropdown.innerHTML = `<option value="" selected disabled>-- Choose Warehouse --</option>`;

                        let hasStock = false;
                        for (let warehouseName in stockMap) {
                            let stockInfo = stockMap[warehouseName];

                            if (stockInfo && stockInfo.qty > 0) {
                                hasStock = true;
                                dropdown.innerHTML += `<option value="${stockInfo.id}">${warehouseName} (${stockInfo.qty} available)</option>`;
                            }
                        }

                        if (!hasStock) {
                            dropdown.innerHTML = `<option value="" disabled>Out of Stock</option>`;
                        }
                    })
                    .catch(err => {
                        console.error("Error loading stock for product " + pid, err);
                        dropdown.innerHTML = `<option value="" disabled>Error loading stock</option>`;
                    });
            });
        });

    // 3. Central Function with Guest Cart Support & Warehouse Validation
    function processAction(pid, actionType) {
        let selectDropdown = document.getElementById(`warehouse-select-${pid}`);
        let selectedWarehouseId = selectDropdown.value;


        if (!selectedWarehouseId) {
            alert("⚠️ Please select a warehouse before proceeding!");
            selectDropdown.focus();
            return;
        }

        if (actionType === 'cart') {

            fetch(`add-to-cart?pid=${pid}&wid=${selectedWarehouseId}&qty=1`)
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        alert('🛒 Item added to cart successfully!');
                    } else {
                        alert('⚠️ ' + (data.message ? data.message : 'Failed to add item.'));
                    }
                })
                .catch(err => alert('An error occurred while processing your request.'));

        } else if (actionType === 'buy') {

            if (!isLoggedIn) {
                alert("🔒 Please login to your account to proceed to checkout!");
                window.location.href = 'login.html';
                return;
            }
            window.location.href = `checkout.html?pid=${pid}&wid=${selectedWarehouseId}&qty=1`;
        }
    }
</script>
</body>
</html>
