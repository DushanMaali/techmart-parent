<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechMart | Home</title>
    <!-- Bootstrap CSS for modern and clean UI -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .product-card { border: 1px solid #eee; padding: 15px; border-radius: 12px; transition: 0.3s; background: #fff; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .category-title { border-left: 5px solid #0d6efd; padding-left: 10px; margin-top: 40px; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body class="bg-light">

<!-- Header Navigation -->
<header class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm p-3">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="index.html">TechMart</a>
        <nav id="nav-container" class="d-flex gap-2"></nav>
    </div>
</header>

<!-- Main Content Area -->
<main class="container my-4">
    <div id="product-list-container">
        <!-- Products grouped by Category will load here dynamically -->
    </div>
</main>

<!-- Bootstrap Modal for Warehouse Stock Display -->
<div class="modal fade" id="stockModal" tabindex="-1" aria-labelledby="stockModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="stockModalLabel">Available Warehouse Stock</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <ul class="list-group" id="stock-list">
                    <!-- Stock details load here -->
                </ul>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // 1. Header Status Load
    fetch('user-status')
        .then(res => res.json())
        .then(data => {
            let nav = document.getElementById('nav-container');
            if (data.status === 'logged') {
                nav.innerHTML = `
                    <span class="text-white align-self-center me-3">Hello, <strong>${data.name}</strong></span>
                    <a href="cart.html" class="btn btn-outline-light btn-sm">Cart</a>
                    <a href="profile.html" class="btn btn-outline-light btn-sm">Profile</a>
                    <a href="logout" class="btn btn-danger btn-sm">Logout</a>`;
            } else {
                nav.innerHTML = `
                    <a href="login.html" class="btn btn-primary btn-sm">Login</a>
                    <a href="cart.html" class="btn btn-outline-light btn-sm">Cart</a>`;
            }
        });

    // 2. Load Category-Wise Products
    fetch('get-products-by-category')
        .then(res => res.json())
        .then(data => {
            let container = document.getElementById('product-list-container');
            container.innerHTML = ""; // Clear loader text

            if (Object.keys(data).length === 0) {
                container.innerHTML = `<div class="alert alert-warning text-center">No active products available!</div>`;
                return;
            }

            for (let categoryName in data) {
                // Generate Category Section
                let sectionId = "cat-" + categoryName.replace(/\s+/g, '-');
                container.innerHTML += `
                    <div class="mb-5">
                        <h3 class="category-title text-uppercase">${categoryName}</h3>
                        <div class="row g-4" id="${sectionId}"></div>
                    </div>`;

                // Append Products to the current Category Row
                let row = document.getElementById(sectionId);
                data[categoryName].forEach(p => {
                    row.innerHTML += `
                        <div class="col-md-3">
                            <div class="product-card h-100 d-flex flex-column justify-content-between shadow-sm">
                                <div>
                                    <h5 class="fw-bold mb-2">${p.productName}</h5>
                                    <p class="text-muted small">${p.description ? p.description : 'No description available.'}</p>
                                </div>
                                <div class="mt-3">
                                    <p class="text-primary fw-bold fs-5 mb-3">LKR ${p.price.toLocaleString()}</p>
                                    <div class="d-grid gap-2">
                                        <button class="btn btn-outline-secondary btn-sm" onclick="viewWarehouseStock(${p.productId})">View Stock</button>
                                        <button class="btn btn-primary btn-sm" onclick="addToCart(${p.productId})">Add to Cart</button>
                                    </div>
                                </div>
                            </div>
                        </div>`;
                });
            }
        });

    // 3. Add to Cart Function
    function addToCart(pid) {
        fetch('add-to-cart?pid=' + pid)
            .then(res => res.json())
            .then(data => {
                if(data.redirect) window.location.href = 'login.html';
                else alert('Added to cart successfully!');
            });
    }

    // 4. View Stock Details inside Bootstrap Modal
    function viewWarehouseStock(pid) {
        let stockList = document.getElementById('stock-list');
        stockList.innerHTML = `<li class="list-group-item text-center text-muted">Loading stock data...</li>`;

        // Show the Modal first
        let myModal = new bootstrap.Modal(document.getElementById('stockModal'));
        myModal.show();

        fetch('get-stock?pid=' + pid)
            .then(res => res.json())
            .then(stockMap => {
                stockList.innerHTML = "";
                if (Object.keys(stockMap).length === 0) {
                    stockList.innerHTML = `<li class="list-group-item list-group-item-danger text-center">Out of Stock in all warehouses!</li>`;
                    return;
                }
                for (let warehouseName in stockMap) {
                    let qty = stockMap[warehouseName];
                    let badgeClass = qty > 10 ? 'bg-success' : (qty > 0 ? 'bg-warning text-dark' : 'bg-danger');
                    stockList.innerHTML += `
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            <span>🏢 ${warehouseName}</span>
                            <span class="badge ${badgeClass} rounded-pill">${qty} available</span>
                        </li>`;
                }
            })
            .catch(err => {
                stockList.innerHTML = `<li class="list-group-item list-group-item-danger text-center">Failed to fetch stock data.</li>`;
            });
    }
</script>
</body>
</html>
