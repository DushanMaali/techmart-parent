<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechMart | Home</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .product-card { border: 1px solid #eee; padding: 20px; border-radius: 12px; transition: 0.3s; background: #fff; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .category-title { border-left: 5px solid #0d6efd; padding-left: 10px; margin-top: 40px; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body class="bg-light">

<!-- Header Navigation -->
<header class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm p-3">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="index.html">TechMart</a>
        <nav id="nav-container" class="d-flex gap-2"></nav>
    </div>
</header>

<div id="toast-container" style="position: fixed; top: 20px; right: 20px; z-index: 1050;"></div>

<main class="container my-4">
    <div id="product-list-container"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/js/bootstrap.bundle.min.js"></script>

<script>
    let isLoggedIn = false;

    function showToast(message) {
        let container = document.getElementById('toast-container');
        let toast = document.createElement('div');
        toast.className = 'toast show align-items-center mb-2 bg-white border border-primary';
        toast.innerHTML = `
            <div class="d-flex p-2">
                <div class="toast-body">${message}</div>
                <button type="button" class="btn-close" onclick="this.parentElement.parentElement.remove()"></button>
            </div>`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 5000);
    }

    // 1. Header Status Load
    fetch('user-status')
        .then(res => res.json())
        .then(data => {
            let nav = document.getElementById('nav-container');
            if (data.status === 'logged') {
                isLoggedIn = true;
                nav.innerHTML = `
                <span class="text-white align-self-center me-3">Hello, <strong>${data.name}</strong></span>
                <a href="cart.html" class="btn btn-outline-light btn-sm">Cart</a>
                <a href="profile.html" class="btn btn-outline-light btn-sm">Profile</a>
                <a href="logout" class="btn btn-danger btn-sm">Logout</a>`;
                loadNotifications();
            } else {
                nav.innerHTML = `
                <a href="login.html" class="btn btn-primary btn-sm">Login</a>
                <a href="cart.html" class="btn btn-outline-light btn-sm">Cart</a>`;
            }
        });

    // 2. Load Products
    fetch('get-products-by-category')
        .then(res => res.json())
        .then(data => {
            let container = document.getElementById('product-list-container');
            for (let categoryName in data) {
                let sectionId = "cat-" + categoryName.replace(/\s+/g, '-');
                container.innerHTML += `
                    <div class="mb-5">
                        <h3 class="category-title text-uppercase">${categoryName}</h3>
                        <div class="row g-4" id="${sectionId}"></div>
                    </div>`;

                data[categoryName].forEach(p => {
                    document.getElementById(sectionId).innerHTML += `
                        <div class="col-md-3">
                            <div class="product-card h-100 d-flex flex-column justify-content-between shadow-sm">
                                <h5>${p.productName}</h5>
                                <p class="text-primary fw-bold">LKR ${p.price.toLocaleString()}</p>
                                <select class="form-select mb-3 warehouse-dropdown" id="warehouse-select-${p.productId}" data-pid="${p.productId}">
                                    <option value="" selected disabled>Loading...</option>
                                </select>
                                <div class="d-grid gap-2">
                                    <button class="btn btn-primary btn-sm" onclick="processAction(${p.productId}, 'cart')">Add to Cart</button>
                                    <button class="btn btn-dark btn-sm" onclick="processAction(${p.productId}, 'buy')">Buy Now</button>
                                </div>
                            </div>
                        </div>`;
                });
            }
            // Load stock data
            document.querySelectorAll('.warehouse-dropdown').forEach(dropdown => {
                let pid = dropdown.getAttribute('data-pid');
                fetch('get-stock?pid=' + pid).then(res => res.json()).then(stockMap => {
                    dropdown.innerHTML = `<option value="" selected disabled>-- Choose Warehouse --</option>`;
                    for (let wName in stockMap) {
                        if (stockMap[wName].qty > 0) dropdown.innerHTML += `<option value="${stockMap[wName].id}">${wName}</option>`;
                    }
                });
            });
        });

    // 3. Process Action
    function processAction(pid, actionType) {
        let selectDropdown = document.getElementById(`warehouse-select-${pid}`);
        if (!selectDropdown.value) {
            showToast("⚠️ Please select a warehouse first!");
            return;
        }

        if (actionType === 'cart') {
            fetch(`add-to-cart?pid=${pid}&wid=${selectDropdown.value}&qty=1`)
                .then(res => res.json())
                .then(data => showToast(data.success ? '🛒 Added to cart!' : '⚠️ ' + data.message));
        } else {
            if (!isLoggedIn) {
                showToast("🔒 Please login first!");
                setTimeout(() => window.location.href = 'login.html', 1500);
            } else {
                window.location.href = `checkout.html?pid=${pid}&wid=${selectDropdown.value}&qty=1`;
            }
        }
    }

    // Notification System
    function loadNotifications() {
        if (!isLoggedIn) return;
        fetch('get-notifications')
            .then(res => res.json())
            .then(notifications => {
                notifications.forEach(n => {
                    showToast("🔔 " + n.message);
                    fetch('mark-read?id=' + n.id);
                });
            });
    }

    setInterval(loadNotifications, 10000);
</script>
</body>
</html>
