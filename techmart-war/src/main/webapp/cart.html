<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechMart | My Cart</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div id="toast-container" style="position: fixed; top: 20px; right: 20px; z-index: 1050;"></div>

<div class="container my-5">
    <div class="card shadow-sm border-0 p-4">
        <h2 class="fw-bold text-primary mb-4">🛒 Shopping Cart</h2>
        <hr>

        <div class="table-responsive">
            <table class="table align-middle">
                <thead class="table-dark">
                <tr>
                    <th>Product</th>
                    <th>Price</th>
                    <th class="text-center" style="width: 150px;">Quantity</th>
                    <th>Sub Total</th>
                    <th class="text-center">Action</th>
                </tr>
                </thead>
                <tbody id="cart-items-tbody">
                <tr>
                    <td colspan="5" class="text-center text-muted">Loading your cart items...</td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="row mt-4 align-items-center">
            <div class="col-md-6">
                <a href="home.html" class="btn btn-outline-secondary">Continue Shopping</a>
            </div>
            <div class="col-md-6 text-end">
                <h4 class="fw-bold mb-3">Grand Total: <span class="text-success" id="cart-grand-total">LKR 0.00</span>
                </h4>
                <a href="checkout.html" class="btn btn-primary btn-lg fw-bold" id="checkout-btn">Proceed to Checkout
                    (Buy Now)</a>
            </div>
        </div>
    </div>
</div>
<script>
    let isLoggedIn = false;

    document.addEventListener("DOMContentLoaded", function () {
        checkUserStatus().then(() => {
            loadCart();
        });
    });

    function checkUserStatus() {
        return fetch('user-status')
            .then(res => res.json())
            .then(data => {
                if (data.status === 'logged') {
                    isLoggedIn = true;
                } else {
                    isLoggedIn = false;
                }
            })
            .catch(err => {
                console.error("Error checking user status:", err);
                isLoggedIn = false;
            });
    }

    function loadCart() {
        fetch('get-cart-details')
            .then(res => res.json())
            .then(cartData => {
                let tbody = document.getElementById('cart-items-tbody');
                let checkoutBtn = document.getElementById('checkout-btn');
                tbody.innerHTML = "";

                if (cartData.items && cartData.items.length > 0) {
                    checkoutBtn.classList.remove('disabled');

                    checkoutBtn.onclick = function (e) {
                        if (!isLoggedIn) {
                            e.preventDefault();
                            alert("🔒 Please login to your account to proceed with checkout!");
                            window.location.href = 'login.html';
                        }
                    };

                    cartData.items.forEach(item => {
                        let pId = item.productId;
                        let wId = item.warehouseId;

                        let rowId = `cart-row-${pId}-${wId}`;
                        let qtyInputId = `qty-input-${pId}-${wId}`;
                        let subTotalId = `subtotal-${pId}-${wId}`;

                        tbody.innerHTML += `
        <tr id="${rowId}">
            <td><span class="fw-bold text-dark">${item.productName}</span></td>
            <td>LKR ${item.price.toLocaleString()}</td>
            <td>
                <div class="input-group input-group-sm justify-content-center">
                    <button class="btn btn-outline-secondary fw-bold" type="button" onclick="changeQty(${pId}, ${wId}, -1)">-</button>
                    <input type="text" id="${qtyInputId}" class="form-control text-center fw-bold bg-white" value="${item.qty}" style="max-width: 50px;" readonly>
                    <button class="btn btn-outline-secondary fw-bold" type="button" onclick="changeQty(${pId}, ${wId}, 1)">+</button>
                </div>
            </td>
            <td class="fw-bold text-secondary"><span id="${subTotalId}">LKR ${item.subTotal.toLocaleString()}</span></td>
            <td class="text-center">
                <button class="btn btn-danger btn-sm" onclick="removeItem(${item.inventoryId}, '${rowId}')">Remove</button>
            </td>
        </tr>`;
                    });
                    document.getElementById('cart-grand-total').innerText = `LKR ${cartData.total.toLocaleString()}`;
                } else {
                    showEmptyCart();
                }
            })
            .catch(err => {
                console.error(err);
                document.getElementById('cart-items-tbody').innerHTML = `<tr><td colspan="5" class="text-center text-danger">Error loading cart details.</td></tr>`;
            });
    }

    function changeQty(productId, warehouseId, change) {
        fetch(`update-cart?action=update_qty&pid=${productId}&wid=${warehouseId}&qtyChange=${change}`, {
            method: 'POST'
        })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    if (data.itemRemoved) {
                        let row = document.getElementById(`cart-row-${productId}-${warehouseId}`);
                        if (row) row.remove();

                        let tbody = document.getElementById('cart-items-tbody');
                        if (tbody.children.length === 0) {
                            showEmptyCart();
                        }
                    } else {
                        document.getElementById(`qty-input-${productId}-${warehouseId}`).value = data.updatedQty;
                        document.getElementById(`subtotal-${productId}-${warehouseId}`).innerText = `LKR ${data.updatedSubTotal.toLocaleString()}`;
                    }

                    document.getElementById('cart-grand-total').innerText = `LKR ${data.grandTotal.toLocaleString()}`;
                } else {
                    alert("⚠️ " + (data.message ? data.message : "Quantity update failed."));
                }
            })
            .catch(err => console.error("Error updating quantity:", err));
    }

    function removeItem(inventoryId, rowId) {
        if (confirm("Are you sure you want to remove this item?")) {
            fetch(`update-cart?action=remove&inventoryId=${inventoryId}`, {
                method: 'POST'
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        let row = document.getElementById(rowId);
                        if (row) row.remove();

                        document.getElementById('cart-grand-total').innerText = `LKR ${data.grandTotal.toLocaleString()}`;

                        let tbody = document.getElementById('cart-items-tbody');
                        if (tbody.children.length === 0) {
                            showEmptyCart();
                        }
                    } else {
                        alert("❌ Failed to remove item!");
                    }
                })
                .catch(err => console.error("Error removing item:", err));
        }
    }

    function showEmptyCart() {
        document.getElementById('cart-items-tbody').innerHTML = `<tr><td colspan="5" class="text-center text-warning fw-bold p-4">Your cart is empty!</td></tr>`;
        document.getElementById('cart-grand-total').innerText = `LKR 0.00`;
        document.getElementById('checkout-btn').classList.add('disabled');
        document.getElementById('checkout-btn').onclick = null;
    }
</script>
<script src="js/notifications.js"></script>
</body>
</html>
