<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechMart - Register</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card p-4 shadow-sm" style="width: 100%; max-width: 450px;">
        <h3 class="text-center text-primary mb-4">TechMart SignUp</h3>

        <form action="register" method="POST">
            <div class="row g-2 mb-3">
                <div class="col">
                    <label class="form-label small">First Name</label>
                    <input type="text" name="fname" class="form-control" required>
                </div>
                <div class="col">
                    <label class="form-label small">Last Name</label>
                    <input type="text" name="lname" class="form-control" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label small">Email Address</label>
                <input type="email" name="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label small">Password (Max 8 chars)</label>
                <input type="password" name="password" class="form-control" maxlength="8" required>
            </div>

            <div class="mb-4">
                <label class="form-label small">Mobile Number</label>
                <input type="text" name="mobile" class="form-control" maxlength="10" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-3">Create Account</button>
        </form>

        <div class="text-center small">
            Already have an account? <a href="login.html" class="text-decoration-none">Login here</a>
        </div>
    </div>
</div>
</body>
</html>
